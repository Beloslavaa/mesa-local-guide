<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MESA · guía local</title>
<link href="https://fonts.googleapis.com/css2?family=Just+Me+Again+Down+Here&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<style>
  :root {
    --paper: #f0ebe0;
    --paper-dark: #e4dece;
    --ink: #1a1714;
    --red: #b8321a;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; user-select: none; -webkit-user-select: none; }

  html, body {
    height: 100%;
    background: #2a2520;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }

  .app {
    width: 420px; height: 760px;
    position: relative; overflow: hidden;
    background: var(--paper);
    box-shadow: 0 0 0 1px rgba(0,0,0,0.15), 0 40px 80px rgba(0,0,0,0.6);
  }
  @media (max-width: 420px) {
    .app { width: 100%; height: 100vh; }
  }

  /* Paper texture */
  .paper-texture {
    position: absolute; inset: 0; z-index: 1;
    pointer-events: none;
    background-image: repeating-linear-gradient(
      180deg, transparent, transparent 27px,
      rgba(0,0,0,0.022) 27px, rgba(0,0,0,0.022) 28px);
    mix-blend-mode: multiply;
  }

  .content { position: absolute; inset: 0; z-index: 2; }

  /* Decorative tables scattered around the page */
  .deco-table {
    position: absolute;
    z-index: 1;
    pointer-events: none;
  }
  .deco-table img { width: 100%; height: 100%; object-fit: contain; display: block; }

  /* ── MASTHEAD ────────────────────────────────────────── */
  .masthead {
    padding: 22px 22px 0;
    text-align: left;
    position: relative;
  }
  .logo-area { display: flex; align-items: baseline; gap: 14px; }
  .logo {
    font-family: 'Just Me Again Down Here', cursive;
    font-size: 90px;
    line-height: 0.85;
    color: var(--ink);
    letter-spacing: 3px;
    transform: rotate(-1.5deg);
    display: inline-block;
    /* Fake-bold via text-shadow since this font has only one weight */
    text-shadow:
      0.5px 0 0 var(--ink),
      -0.5px 0 0 var(--ink),
      0 0.5px 0 var(--ink),
      0 -0.5px 0 var(--ink);
  }
  .logo-sub {
    font-family: 'Just Me Again Down Here', cursive;
    font-size: 30px;
    color: var(--ink);
    opacity: 0.55;
    letter-spacing: 1px;
    transform: translateY(-8px) rotate(-1deg);
    display: inline-block;
  }
  .masthead-clock {
    font-family: 'Just Me Again Down Here', cursive;
    font-size: 22px;
    color: var(--ink);
    opacity: 0.45;
    margin-top: 4px;
    transform: rotate(-0.5deg);
    display: inline-block;
    letter-spacing: 0;
  }
  .logo-underline {
    display: block;
    width: 100px;
    height: 8px;
    margin-top: -2px;
    margin-left: 2px;
  }
  .h-rule {
    width: 100%;
    height: 16px;
    margin: 6px 0 0;
    overflow: visible;
  }

  /* ── NEWSPAPER PILE ──────────────────────────────────── */
  .stash {
    position: absolute;
    bottom: 260px; left: 50%;
    transform: translateX(-50%);
    width: 250px; height: 310px;
    z-index: 5;
    cursor: pointer;
    transition: opacity 0.35s ease;
  }
  .stash.dim { opacity: 0; pointer-events: none; }

  .pile-item {
    position: absolute;
    top: 50%; left: 50%;
    width: 230px; height: 290px;
    overflow: hidden;
    background: var(--paper);
    box-shadow:
      3px 3px 0 var(--ink),
      5px 5px 0 rgba(0,0,0,0.18);
    transition: transform 0.6s cubic-bezier(0.34, 1.15, 0.64, 1);
    transform-origin: center center;
  }
  /* Pile preview shows only top-left quadrant of the leaflet */
  .pile-item img {
    width: 460px; height: 580px;
    object-fit: cover;
    object-position: top left;
    display: block;
    position: absolute;
    top: 0; left: 0;
  }

  /* Pile positions: each tier gets translation + rotation */
  .pile-item[data-pos="0"] { transform: translate(-50%, -50%) translate(0px, 0px) rotate(3.5deg); z-index: 4; }
  .pile-item[data-pos="1"] { transform: translate(-50%, -50%) translate(2px, 2px) rotate(1deg); z-index: 3; }
  .pile-item[data-pos="2"] { transform: translate(-50%, -50%) translate(-5px, 5px) rotate(-3deg); z-index: 2; }
  .pile-item[data-pos="3"] { transform: translate(-50%, -50%) translate(-10px, 10px) rotate(-6deg); z-index: 1; }

  /* When the top item is being "picked up" */
  .pile-item.lifting {
    transition: transform 0.5s cubic-bezier(0.5, 0, 0.5, 1), opacity 0.3s ease;
    transform: translate(-50%, -120%) scale(1.05) rotate(0deg);
    opacity: 0;
    z-index: 10;
  }

  /* "tap to open" hint */
  .stash-hint {
    position: absolute;
    bottom: 220px;
    left: 50%;
    font-family: 'Just Me Again Down Here', cursive;
    font-size: 21px;
    color: var(--ink);
    opacity: 0.55;
    z-index: 6;
    white-space: nowrap;
    animation: wobble-hint 2.5s ease-in-out infinite;
    pointer-events: none;
  }
  .stash-hint.gone { opacity: 0 !important; animation: none; }
  @keyframes wobble-hint {
    0%,100% { transform: translateX(-50%) rotate(-1.5deg); opacity: 0.45; }
    50%     { transform: translateX(-50%) rotate(-0.5deg); opacity: 0.7; }
  }

  /* ── LEAFLET VIEWER (3D fold) ────────────────────────── */
  .viewer {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    perspective: 1800px;
    z-index: 7;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s ease;
  }
  .viewer.visible { opacity: 1; pointer-events: auto; }

  .leaflet-wrap {
    position: relative;
    transition: transform 0.5s cubic-bezier(0.5, 0, 0.75, 0), opacity 0.5s ease;
    filter:
      drop-shadow(4px 4px 0 var(--ink))
      drop-shadow(0 16px 30px rgba(0,0,0,0.35));
  }
  .leaflet-wrap.dismissing {
    /* JS sets transform via inline style */
  }

  .leaflet {
    position: relative;
    width: 340px; height: 425px;
    transform-style: preserve-3d;
    /* Closed state: shifted so Q1 is centered in view */
    transform: translate(85px, 106.25px);
    transition: transform 0.7s cubic-bezier(0.34, 1.15, 0.64, 1);
    cursor: pointer;
  }
  .leaflet.is-open {
    transform: translate(0, 0);
  }

  .quad {
    position: absolute;
    width: 170px; height: 212.5px;
    overflow: hidden;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    transform-style: preserve-3d;
  }
  .quad img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }

  /* Q1 — always visible, the cover */
  .q1 { top: 0; left: 0; z-index: 2; background: var(--paper); }

  /* Q2 — top-right, folded behind Q1 when closed (rotateY -180), unfolds to 0 */
  .q2 {
    top: 0; left: 170px;
    transform-origin: left center;
    transform: rotateY(-180deg);
    transition: transform 0.65s cubic-bezier(0.32, 1.1, 0.58, 1);
    z-index: 3;
  }
  .leaflet.is-open .q2 { transform: rotateY(0deg); }
  .q2::before {
    content: '';
    position: absolute; inset: 0;
    background: var(--paper-dark);
    background-image: repeating-linear-gradient(
      60deg, transparent, transparent 10px,
      rgba(0,0,0,0.025) 10px, rgba(0,0,0,0.025) 11px);
    transform: rotateY(180deg);
    backface-visibility: hidden; -webkit-backface-visibility: hidden;
    z-index: 1;
  }

  /* Q3 — bottom-left, folded up behind Q1 when closed (rotateX 180), unfolds to 0 */
  .q3 {
    top: 212.5px; left: 0;
    transform-origin: center top;
    transform: rotateX(180deg);
    transition: transform 0.7s cubic-bezier(0.34, 1.15, 0.64, 1) 0.35s;
    z-index: 3;
  }
  .leaflet.is-open .q3 { transform: rotateX(0deg); }
  .q3::before {
    content: '';
    position: absolute; inset: 0;
    background: var(--paper-dark);
    transform: rotateX(180deg);
    backface-visibility: hidden; -webkit-backface-visibility: hidden;
    z-index: 1;
  }

  /* Q4 — bottom-right, folded up behind Q2 when closed */
  .q4 {
    top: 212.5px; left: 170px;
    transform-origin: center top;
    transform: rotateX(180deg);
    transition: transform 0.7s cubic-bezier(0.34, 1.15, 0.64, 1) 0.35s;
    z-index: 3;
  }
  .leaflet.is-open .q4 { transform: rotateX(0deg); }
  .q4::before {
    content: '';
    position: absolute; inset: 0;
    background: #d8d0bc;
    transform: rotateX(180deg);
    backface-visibility: hidden; -webkit-backface-visibility: hidden;
    z-index: 1;
  }

  /* Crease lines */
  .crease-v {
    position: absolute; top: 0; bottom: 0; left: 170px;
    width: 2px;
    background: linear-gradient(180deg,
      transparent, rgba(0,0,0,0.15) 20%, rgba(0,0,0,0.22) 50%,
      rgba(0,0,0,0.15) 80%, transparent);
    pointer-events: none; z-index: 10;
    opacity: 0;
    transition: opacity 0.3s ease 0s;
  }
  .crease-h {
    position: absolute; left: 0; right: 0; top: 212.5px;
    height: 2px;
    background: linear-gradient(90deg,
      transparent, rgba(0,0,0,0.15) 20%, rgba(0,0,0,0.22) 50%,
      rgba(0,0,0,0.15) 80%, transparent);
    pointer-events: none; z-index: 10;
    opacity: 0;
    transition: opacity 0.3s ease 0s;
  }
  /* Show creases only after panels have rotated out of the way */
  .leaflet.is-open .crease-v {
    opacity: 1;
    transition: opacity 0.3s ease 0.55s;
  }
  .leaflet.is-open .crease-h {
    opacity: 1;
    transition: opacity 0.3s ease 0.85s;
  }

  /* "tap to turn" — shown when the leaflet is fully unfolded, above the leaflet.
     Positioned relative to the viewer (not the leaflet-wrap) to avoid the
     drop-shadow filter applying to the text. */
  .open-hint {
    position: absolute;
    top: 50%;
    left: 50%;
    /* Sit ~260px above the viewer center — comfortably above the 425px leaflet */
    margin-top: -260px;
    font-family: 'Just Me Again Down Here', cursive;
    font-size: 21px;
    color: var(--ink); opacity: 0;
    transition: opacity 0.4s ease 0.4s;
    pointer-events: none;
    white-space: nowrap;
    transform: translateX(-50%);
    z-index: 60;
  }
  .viewer.opened .open-hint {
    opacity: 0.55;
    animation: wobble-open-hint 2.5s ease-in-out infinite 1.2s;
  }
  @keyframes wobble-open-hint {
    0%,100% { transform: translateX(-50%) rotate(-1.5deg); opacity: 0.45; }
    50%     { transform: translateX(-50%) rotate(-0.5deg); opacity: 0.7; }
  }

  /* ── BOTTOM ARCHIVE BUTTON ───────────────────────────── */
  .bottom-bar {
    position: absolute; bottom: 56px; left: 0; right: 0;
    height: 90px;
    display: flex; align-items: center; justify-content: center;
    gap: 72px;
    z-index: 11;
  }
  .archive-btn {
    font-family: 'Just Me Again Down Here', cursive;
    font-size: 28px;
    color: var(--ink);
    cursor: pointer;
    border: none;
    background: transparent;
    padding: 8px 20px;
    transform: rotate(-1deg);
    transition: transform 0.18s ease;
    position: relative;
    line-height: 1;
  }
  .archive-btn-circle {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 100%; height: 100%;
    pointer-events: none;
    overflow: visible;
  }
  .archive-btn:hover { transform: rotate(-0.5deg) scale(1.04); }
  .archive-btn:active { transform: rotate(0.5deg) scale(0.96); }

  /* ── "best now" button — red, spiky oval ─────────────── */
  .bestnow-btn {
    font-family: 'Just Me Again Down Here', cursive;
    font-size: 28px;
    color: var(--red);
    cursor: pointer;
    border: none;
    background: transparent;
    padding: 14px 26px;
    transform: rotate(1deg);
    transition: transform 0.18s ease;
    position: relative;
    line-height: 1;
    white-space: nowrap;
    text-shadow:
      0.5px 0 0 var(--red),
      -0.5px 0 0 var(--red),
      0 0.5px 0 var(--red),
      0 -0.5px 0 var(--red);
  }
  .bestnow-btn-burst {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 120%; height: 160%;
    pointer-events: none;
    overflow: visible;
  }
  .bestnow-btn:hover { transform: rotate(0.5deg) scale(1.05); }
  .bestnow-btn:active { transform: rotate(-0.5deg) scale(0.96); }

  /* ── ARCHIVE OVERLAY ─────────────────────────────────── */
  .archive {
    position: absolute; inset: 0;
    background: var(--paper);
    z-index: 50;
    transform: translateY(100%);
    transition: transform 0.45s cubic-bezier(0.32, 0.72, 0, 1);
    padding: 22px 18px 90px;
    overflow-y: auto;
  }
  .archive.visible { transform: translateY(0); pointer-events: auto; }

  .archive-top {
    display: flex; align-items: flex-end; justify-content: space-between;
    padding-bottom: 12px;
    margin-bottom: 18px;
    position: relative;
  }
  .archive-top::after {
    content: '';
    position: absolute; bottom: 0; left: 0; right: 0;
    height: 2px; background: var(--ink); opacity: 0.12;
    transform: rotate(-0.3deg);
  }
  .archive-title {
    font-family: 'Just Me Again Down Here', cursive;
    font-size: 88px; line-height: 0.85;
    color: var(--ink);
    letter-spacing: 2px;
    transform: rotate(-1.5deg);
    display: inline-block;
    text-shadow:
      0.5px 0 0 var(--ink), -0.5px 0 0 var(--ink),
      0 0.5px 0 var(--ink), 0 -0.5px 0 var(--ink);
  }
  .archive-close {
    font-family: 'Just Me Again Down Here', cursive;
    font-size: 24px;
    color: var(--ink); opacity: 0.55;
    cursor: pointer; border: none; background: none;
    margin-bottom: 6px;
    transition: opacity 0.2s;
  }
  .archive-close:hover { opacity: 0.95; color: var(--red); }

  .archive-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .arch-item {
    aspect-ratio: 4/5;
    position: relative; overflow: hidden;
    cursor: pointer;
    box-shadow: 3px 3px 0 var(--ink), 2px 2px 0 rgba(0,0,0,0.1);
    transition: transform 0.2s ease;
  }
  .arch-item:nth-child(odd)  { transform: rotate(-1deg); }
  .arch-item:nth-child(even) { transform: rotate(1.5deg); }
  .arch-item:nth-child(odd):hover  { transform: rotate(0deg) scale(1.03); }
  .arch-item:nth-child(even):hover { transform: rotate(0.5deg) scale(1.03); }
  .arch-item img { width: 100%; height: 100%; object-fit: cover; display: block; }

  /* ── MAP VIEW ────────────────────────────────────────── */
  .map-view {
    position: absolute; inset: 0;
    background: var(--paper);
    z-index: 55;
    opacity: 0; pointer-events: none;
    transition: opacity 0.35s ease;
    display: flex; flex-direction: column;
  }
  .map-view.visible { opacity: 1; pointer-events: auto; }
  .map-head {
    padding: 22px 22px 12px;
    position: relative;
  }
  .map-head::after {
    content: '';
    position: absolute; bottom: 0; left: 18px; right: 18px;
    height: 2px; background: var(--ink); opacity: 0.12;
    transform: rotate(-0.3deg);
  }
  .map-title {
    font-family: 'Just Me Again Down Here', cursive;
    font-size: 86px; line-height: 0.85;
    color: var(--ink);
    letter-spacing: 2px;
    transform: rotate(-1deg); display: inline-block;
    text-shadow:
      0.5px 0 0 var(--ink), -0.5px 0 0 var(--ink),
      0 0.5px 0 var(--ink), 0 -0.5px 0 var(--ink);
  }
  .map-back {
    position: absolute; top: 36px; right: 22px;
    font-family: 'Just Me Again Down Here', cursive;
    font-size: 24px;
    color: var(--ink); opacity: 0.55;
    cursor: pointer; border: none; background: none;
    transition: opacity 0.2s;
  }
  .map-back:hover { opacity: 0.95; color: var(--red); }

  .map-area {
    flex: 1; position: relative;
    background: var(--paper); overflow: hidden;
    min-height: 280px;
  }
  #leafletMap {
    width: 100%; height: 100%;
    background: var(--paper);
  }
  /* Restyle Leaflet's attribution to be tiny and fit the aesthetic */
  .leaflet-control-attribution {
    font-family: -apple-system, sans-serif !important;
    font-size: 8px !important;
    background: rgba(240,235,224,0.85) !important;
    color: #6a6358 !important;
    padding: 1px 6px !important;
  }
  .leaflet-control-attribution a { color: #6a6358 !important; }
  /* Restyle the zoom buttons to feel paper-ish */
  .leaflet-control-zoom a {
    background: var(--paper) !important;
    color: var(--ink) !important;
    border: 1.5px solid var(--ink) !important;
    border-radius: 0 !important;
    box-shadow: 1.5px 1.5px 0 var(--ink) !important;
    font-family: 'Just Me Again Down Here', cursive !important;
    font-size: 22px !important;
    line-height: 24px !important;
    width: 28px !important;
    height: 28px !important;
  }
  .leaflet-control-zoom { margin: 12px !important; }

  /* Custom marker = red teardrop pin + name label */
  .map-marker {
    display: flex; align-items: center; gap: 6px;
    /* Anchor: dot's bottom tip = real location */
    transform: translate(-7px, -16px);
  }
  .map-marker .pin-dot {
    width: 14px; height: 14px;
    background: var(--red);
    border-radius: 50% 50% 50% 0;
    transform: rotate(-45deg);
    flex-shrink: 0;
    box-shadow: 1px 1px 0 rgba(0,0,0,0.35);
  }
  .map-marker .pin-lbl {
    font-family: 'Just Me Again Down Here', cursive;
    font-size: 22px; color: var(--ink);
    background: rgba(240,235,224,0.95);
    padding: 0 7px;
    transform: rotate(-0.5deg);
    white-space: nowrap;
    box-shadow: 1px 1px 0 rgba(0,0,0,0.15);
    line-height: 1.2;
  }
  .pin {
    position: absolute;
    display: flex; align-items: center; gap: 6px;
    animation: pdrop 0.55s cubic-bezier(0.34,1.56,0.64,1) backwards;
  }
  .pin-dot {
    width: 13px; height: 13px;
    background: var(--red);
    border-radius: 50% 50% 50% 0;
    transform: rotate(-45deg);
    flex-shrink: 0;
    box-shadow: 1px 1px 0 rgba(0,0,0,0.3);
  }
  .pin-lbl {
    font-family: 'Just Me Again Down Here', cursive;
    font-size: 22px; color: var(--ink);
    background: rgba(240,235,224,0.92);
    padding: 0 7px;
    transform: rotate(-0.5deg);
    white-space: nowrap;
    box-shadow: 1px 1px 0 rgba(0,0,0,0.1);
  }
  @keyframes pdrop {
    0%   { opacity:0; transform: translateY(-14px); }
    100% { opacity:1; transform: translateY(0); }
  }
  .map-list { padding: 0 22px 90px; }
  .map-row {
    display: flex; align-items: baseline; gap: 10px;
    padding: 8px 0;
    border-bottom: 1.5px solid rgba(0,0,0,0.08);
    cursor: pointer;
    transition: transform 0.15s ease;
  }
  .map-row:hover { transform: translateX(4px); }
  .map-row:active { transform: translateX(2px) scale(0.99); }
  .map-row .n {
    font-family: 'Just Me Again Down Here', cursive;
    font-size: 26px; color: var(--red);
    min-width: 26px;
  }
  .map-row .name {
    font-family: 'Just Me Again Down Here', cursive;
    font-size: 28px; color: var(--ink);
    flex: 1;
    line-height: 1;
  }
  .map-row .dist {
    font-family: 'Just Me Again Down Here', cursive;
    font-size: 18px; letter-spacing: 0;
    color: var(--ink); opacity: 0.45;
  }

  /* ── BEST NOW VIEW ───────────────────────────────────── */
  .bestnow-view {
    position: absolute; inset: 0;
    background: var(--paper);
    z-index: 56;
    opacity: 0; pointer-events: none;
    transition: opacity 0.35s ease;
    display: flex; flex-direction: column;
  }
  .bestnow-view.visible { opacity: 1; pointer-events: auto; }

  .bestnow-title {
    font-family: 'Just Me Again Down Here', cursive;
    font-size: 72px; line-height: 0.85;
    color: var(--red);
    letter-spacing: 2px;
    transform: rotate(-1deg); display: inline-block;
    text-shadow:
      0.5px 0 0 var(--red), -0.5px 0 0 var(--red),
      0 0.5px 0 var(--red), 0 -0.5px 0 var(--red);
  }
  #bestNowMap {
    width: 100%; height: 100%;
    background: var(--paper);
  }

  .bestnow-list {
    padding: 8px 22px 90px;
  }
  .bestnow-row {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 0;
    border-bottom: 1.5px solid rgba(0,0,0,0.08);
    cursor: pointer;
    transition: transform 0.15s ease;
  }
  .bestnow-row:hover { transform: translateX(4px); }
  .bestnow-row:active { transform: translateX(2px) scale(0.99); }
  .bestnow-row .rank {
    font-family: 'Just Me Again Down Here', cursive;
    font-size: 30px; color: var(--red);
    min-width: 30px;
  }
  .bestnow-row .info {
    flex: 1; display: flex; flex-direction: column;
    line-height: 1;
  }
  .bestnow-row .name {
    font-family: 'Just Me Again Down Here', cursive;
    font-size: 28px; color: var(--ink);
    line-height: 1.1;
  }
  .bestnow-row .reason {

<script>
const $ = id => document.getElementById(id);

// ── DATA ─────────────────────────────────────────────────────────
const leafletsData = [
  { img:'images/leaflet1.png', city:'madrid',

      { name:'Snake Bar',          lat:40.4253, lng:-3.6917 },
      { name:'ChinChin',           lat:40.4220, lng:-3.7045 },

  { img:'images/leaflet4.png', city:'madrid',
    spots:[
      { name:'Sala X',                     lat:40.4230, lng:-3.7078 },
      { name:'Bastardo Hostel',            lat:40.4253, lng:-3.6995 },
      { name:'Mkt San Ildefonso',          lat:40.4250, lng:-3.7015 },
      { name:'Café Central',               lat:40.4143, lng:-3.7008 },
      { name:'Círculo de las Bellas Artes',lat:40.4192, lng:-3.6968 },
    ] },
  { img:'images/leaflet5.png', city:'madrid',
    spots:[
      { name:'ACID café',          lat:40.4124, lng:-3.6970 },
      { name:'Chez Madrid',        lat:40.4153, lng:-3.6939 },
      { name:'Bucólico',           lat:40.4205, lng:-3.6985 },
      { name:'Friends in Common',  lat:40.4282, lng:-3.6905 },
      { name:'Keli',               lat:40.4319, lng:-3.6890 },
    ] },
  { img:'images/leaflet6.png', city:'madrid',
    spots:[
      { name:'Sala de Despiece', lat:40.4188, lng:-3.7008 },
      { name:'Her',              lat:40.4244, lng:-3.6845 },
      { name:'LA PAPA',          lat:40.4232, lng:-3.6963 },
      { name:'fismuler',         lat:40.4282, lng:-3.6974 },
      { name:'El Gordito',       lat:40.4254, lng:-3.7045 },
    ] },
];

// pileOrder[0] is the TOP of the pile (visible / next to be opened)
let pileOrder = [0, 1, 2, 3, 4, 5];
let currentIdx = null;  // index of the leaflet currently being viewed
let isAnimating = false;

const stash    = $('stash');
const stashHint = $('stashHint');
const viewer   = $('viewer');
const leafWrap = $('leafWrap');
const leaf     = $('leaf');

// ── BUILD STASH ──────────────────────────────────────────────────
function renderStash() {
  stash.innerHTML = '';
  // We only render the top 4 leaflets visually — the rest exist in the rotation
  // (when one flies away, the next from the queue rotates into view).
  const visibleCount = Math.min(4, pileOrder.length);
  const visible = pileOrder.slice(0, visibleCount);
  // Render bottom-of-pile first, top-of-pile last (so top sits on top in DOM)
  visible.slice().reverse().forEach((leafletIdx, i) => {
    const positionFromTop = visibleCount - 1 - i; // 0=top, 3=bottom
    const div = document.createElement('div');
    div.className = 'pile-item';
    div.dataset.pos = positionFromTop;
    div.dataset.idx = leafletIdx;
    div.innerHTML = `<img src="${leafletsData[leafletIdx].img}" alt="">`;
    stash.appendChild(div);
  });
}
renderStash();

// ── BUILD ARCHIVE GRID ───────────────────────────────────────────
const archGrid = $('archGrid');
function renderArchive() {
  archGrid.innerHTML = '';
  leafletsData.forEach((l, idx) => {
    const div = document.createElement('div');
    div.className = 'arch-item';
    div.innerHTML = `<img src="${l.img}" alt="">`;
    div.addEventListener('click', () => {
      // Move this leaflet to the top of the pile
      pileOrder = [idx, ...pileOrder.filter(i => i !== idx)];
      renderStash();
      closeArchive();
    });
    archGrid.appendChild(div);
  });
}
renderArchive();

// ── HELPERS ──────────────────────────────────────────────────────
function setLeafletImage(src) {
  // src is the full leaflet filename, e.g. 'leaflet1.png'
  // Derive the 4 quadrant slice filenames: leaflet1_q1.png, _q2, _q3, _q4
  const base = src.replace(/\.png$/i, '');
  ['qImg1','qImg2','qImg3','qImg4'].forEach((id, i) => {
    const el = $(id);
    const filename = `${base}_q${i+1}.png`;
    el.onerror = () => {
      console.error('FAILED TO LOAD:', filename);
      // Show error inline in the quadrant so it's visible
      el.parentElement.style.background = '#ffe0e0';
      el.parentElement.innerHTML = `<div style="padding:8px;font-family:monospace;font-size:9px;color:#a00;word-break:break-all;">Missing:<br>${filename}</div>`;
    };
    el.src = filename;
  });
}

// ── TAP STASH → open top leaflet ─────────────────────────────────
stash.addEventListener('click', () => {
  if (isAnimating) return;
  if (currentIdx !== null) return; // already viewing
  openTopLeaflet();
});

function openTopLeaflet() {
  isAnimating = true;
  const topIdx = pileOrder[0];
  currentIdx = topIdx;
  const topItem = stash.querySelector('.pile-item[data-pos="0"]');

  // 1. Load the right slice images into all 4 quadrants
  setLeafletImage(leafletsData[topIdx].img);

  // 2. Make sure the leaflet starts CLOSED (no .is-open class)
  leaf.classList.remove('is-open');
  // Force a reflow so the browser commits the closed state before the next change
  void leaf.offsetHeight;

  // 3. Lift the top pile item visually
  if (topItem) topItem.classList.add('lifting');
  stashHint.classList.add('gone');

  // 4. After pile lift animation finishes, show viewer and unfold
  setTimeout(() => {
    viewer.classList.add('visible');
    // Force another reflow before toggling open
    void leaf.offsetHeight;
    // 5. Tiny delay to let the viewer fade in, then unfold
    setTimeout(() => {
      leaf.classList.add('is-open');
    }, 150);
  }, 400);

  // 6. Mark "opened" after the full unfold completes (~1.5s total)
  setTimeout(() => {
    viewer.classList.add('opened');
    isAnimating = false;
  }, 800);
}

// ── TAP OPEN LEAFLET → map ───────────────────────────────────────
leaf.addEventListener('click', e => {
  if (isAnimating) return;
  if (!viewer.classList.contains('opened')) return;
  showMap();
});

// ── REAL MAP using Leaflet + Thunderforest Transport tiles ───────
const TF_API_KEY = '22d1249b401647bd807e1f63f9dfac26';
let leafletMap = null;
let mapMarkers = [];

function showMap() {
  const l = leafletsData[currentIdx];
  $('mapTitle').textContent = l.city;

  // Build the spot list with click → flyTo
  $('mapList').innerHTML = l.spots.map((s, i) =>
    `<div class="map-row" data-idx="${i}">
       <span class="n">${i+1}.</span>
       <span class="name">${s.name}</span>
     </div>`).join('');

  // Show the view first (so the map container has dimensions to render into)
  $('mapView').classList.add('visible');

  // Build / reset the map on every open. Easier than mutating state.
  if (leafletMap) {
    leafletMap.remove();
    leafletMap = null;
    mapMarkers = [];
  }

  // Defer map creation until after the view is visible & has measured size
  setTimeout(() => {
    leafletMap = L.map('leafletMap', {
      zoomControl: true,
      attributionControl: true,
      scrollWheelZoom: true,
    });

    // Thunderforest Transport tile layer
    L.tileLayer(
      `https://api.thunderforest.com/transport/{z}/{x}/{y}{r}.png?apikey=${TF_API_KEY}`,
      {
        attribution: '&copy; <a href="http://www.thunderforest.com/">Thunderforest</a>, &copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
        maxZoom: 22,
      }
    ).addTo(leafletMap);

    // Add custom HTML markers for each spot
    mapMarkers = l.spots.map((s, i) => {
      const icon = L.divIcon({
        className: '',  // wipe Leaflet's default class so it doesn't add a box
        html: `<div class="map-marker">
                 <div class="pin-dot"></div>
                 <span class="pin-lbl">${s.name}</span>
               </div>`,
        iconSize: null,    // let CSS decide
        iconAnchor: [0, 0],
      });
      const m = L.marker([s.lat, s.lng], { icon }).addTo(leafletMap);
      m.on('click', () => flyToSpot(i));
      return m;
    });

    // Auto-fit so all 5 pins are visible with padding
    const bounds = L.latLngBounds(l.spots.map(s => [s.lat, s.lng]));
    leafletMap.fitBounds(bounds, { padding: [60, 60], maxZoom: 16 });
  }, 50);
}

function flyToSpot(i) {
  if (!leafletMap) return;
  const l = leafletsData[currentIdx];
  const s = l.spots[i];
  leafletMap.flyTo([s.lat, s.lng], 17, { duration: 0.8 });
}

// Wire up list clicks (delegated since rows are recreated on each map open)
$('mapList').addEventListener('click', e => {
  const row = e.target.closest('.map-row');
  if (!row) return;
  flyToSpot(parseInt(row.dataset.idx, 10));
});

$('mapBack').addEventListener('click', () => $('mapView').classList.remove('visible'));

// ── TAP OUTSIDE LEAFLET → dismiss ────────────────────────────────
// The viewer covers the whole screen. Any click on viewer that ISN'T
// on the leaflet itself = dismiss.
viewer.addEventListener('click', e => {
  if (!viewer.classList.contains('opened')) return;
  if (isAnimating) return;
  // If click landed on the leaflet, the leaf's own click handler runs (→ map).
  // We only handle clicks OUTSIDE the leaflet here.
  if (e.target.closest('#leaf')) return;
  // Pick a random pleasing fling direction
  const angle = (Math.random() * 60 - 30) - 90 + (Math.random() < 0.5 ? 180 : 0);
  // Convert to dx/dy on a 600px radius
  const rad = angle * Math.PI / 180;
  const dx = Math.cos(rad) * 600;
  const dy = Math.sin(rad) * 600;
  dismissLeaflet(dx, dy);
});

function dismissLeaflet(dx, dy) {
  isAnimating = true;
  // Normalize direction, fling off-screen
  const len = Math.sqrt(dx*dx + dy*dy);
  const ux = dx / len, uy = dy / len;
  const flyX = ux * 700, flyY = uy * 900;
  const rot = ux * 25;

  leafWrap.style.transition = 'transform 0.55s cubic-bezier(0.5, 0, 0.75, 0), opacity 0.5s ease';
  leafWrap.style.transform = `translate(${flyX}px, ${flyY}px) rotate(${rot}deg)`;
  leafWrap.style.opacity = '0';

  // After fly-out, reset and re-shuffle pile
  setTimeout(() => {
    // Move the current leaflet to the BOTTOM of the pile, top moves up
    pileOrder = [...pileOrder.slice(1), pileOrder[0]];
    currentIdx = null;

    // Reset viewer
    viewer.classList.remove('visible', 'opened');
    leaf.classList.remove('is-open');
    leafWrap.style.transition = '';
    leafWrap.style.transform = '';
    leafWrap.style.opacity = '';

    // Re-show the pile with a fresh stagger
    renderStash();
    stashHint.classList.remove('gone');
    isAnimating = false;
  }, 600);
}

// ── ARCHIVE ──────────────────────────────────────────────────────
$('archiveBtn').addEventListener('click', () => {
  $('archive').classList.add('visible');
});
$('archiveClose').addEventListener('click', closeArchive);
function closeArchive() { $('archive').classList.remove('visible'); }

// ── BEST NOW ─────────────────────────────────────────────────────
// Loads popular_times.json once, computes scores at the current time,
// renders the top 3 spots on a map + list.

let popularTimes = null;       // cached JSON payload
let bestNowMap = null;          // the Leaflet map instance for this view
let bestNowMarkers = [];

// Load the data file lazily (only the first time the user opens this view)
async function ensurePopularTimesLoaded() {
  if (popularTimes) return popularTimes;
  try {
    const r = await fetch('popular_times.json');
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    popularTimes = await r.json();
  } catch (e) {
    console.error('Failed to load popular_times.json:', e);
    popularTimes = { spots: [], clusters: [] };
  }
  return popularTimes;
}

// Smooth busyness preference:
//   - 0 (closed/no activity) → low but nonzero score (≈ 0.15)
//   - 65 (moderately busy, the sweet spot) → 1.0
//   - 100 (packed) → ≈ 0.3
// We never return exactly 0 so a closed-now spot can still rank if its
// cluster's peak hour is near.
function busyFit(busynessScore) {
  if (busynessScore <= 0) return 0.15;
  const target = 65;
  const sigma = 22;
  return Math.exp(-Math.pow(busynessScore - target, 2) / (2 * sigma * sigma));
}

// 1.0 at the cluster's peak hour, falls off with hours of distance (circular).
function typeFit(currentHour, peakHour) {
  let diff = Math.abs(currentHour - peakHour);
  diff = Math.min(diff, 24 - diff); // circular: 23h and 1h are 2 hours apart
  const sigma = 3.5;
  return Math.exp(-Math.pow(diff, 2) / (2 * sigma * sigma));
}

// Pick which day's busyness curve to use based on the current weekday.
function busynessForNow(spot) {
  const days = ['sunday','monday','tuesday','wednesday','thursday','friday','saturday'];
  const today = days[new Date().getDay()];
  const arr = spot.busyness && spot.busyness[today];
  if (!arr || arr.length !== 24) return null;
  return arr;
}

// Build a one-line reason for why this spot scored where it did.
function reasonFor(spot, hour, busyScore, cluster, isManual) {
  const peak = cluster.peak_hour;
  let diff = Math.abs(hour - peak);
  diff = Math.min(diff, 24 - diff);

  let timeWord;
  if (diff <= 1)      timeWord = `${cluster.label} peak`;
  else if (diff <= 3) timeWord = `near ${cluster.label} peak`;
  else                timeWord = `quiet ${cluster.label}`;

  if (isManual) {
    return `curator's pick · ${timeWord}`;
  }

  let busyWord;
  if (busyScore >= 80)      busyWord = 'packed';
  else if (busyScore >= 55) busyWord = 'pleasantly buzzing';
  else if (busyScore >= 25) busyWord = 'gently filling';
  else if (busyScore > 0)   busyWord = 'quiet right now';
  else                      busyWord = 'likely closed';
  return `${timeWord} · ${busyWord}`;
}

function computeBestNow() {
  const now = new Date();
  const hour = now.getHours();
  const clusters = popularTimes.clusters || [];
  const clusterById = Object.fromEntries(clusters.map(c => [c.id, c]));

  const scored = [];
  for (const spot of (popularTimes.spots || [])) {
    if (spot.cluster === null || spot.cluster === undefined) continue;
    const cluster = clusterById[spot.cluster];
    if (!cluster) continue;

    const tf = typeFit(hour, cluster.peak_hour);

    let bf, busyNow, score;
    if (spot.manual) {
      // No real busyness data — neutral busy_fit, slight confidence penalty
      busyNow = null;
      bf = 0.5;
      score = (0.5 * bf + 0.5 * tf) * 10 * 0.85;
    } else {
      const curve = busynessForNow(spot);
      if (!curve) continue;
      busyNow = curve[hour] || 0;
      bf = busyFit(busyNow);
      score = (0.5 * bf + 0.5 * tf) * 10;
    }

    scored.push({
      spot, score, busyNow, cluster,
      isManual: !!spot.manual,
      reason: reasonFor(spot, hour, busyNow, cluster, !!spot.manual),
    });
  }

  scored.sort((a, b) => b.score - a.score);
  return scored.slice(0, 3);
}

function fmtClock(d) {
  const h = String(d.getHours()).padStart(2, '0');
  const m = String(d.getMinutes()).padStart(2, '0');
  return `it's ${h}:${m}`;
}

// Masthead clock — set on load, refresh every minute
function tickMastheadClock() {
  const el = $('mastheadClock');
  if (el) el.textContent = fmtClock(new Date());
}
tickMastheadClock();
setInterval(tickMastheadClock, 60 * 1000);

async function showBestNow() {
  $('bestNowView').classList.add('visible');

  await ensurePopularTimesLoaded();
  const top = computeBestNow();

  // List
  if (top.length === 0) {
    $('bestNowList').innerHTML =
      `<div class="bestnow-empty">Mesa is sleeping.<br>Nothing's at its sweet spot right now.</div>`;
  } else {
    $('bestNowList').innerHTML = top.map((t, i) => `
      <div class="bestnow-row" data-idx="${i}">
        <span class="rank">${i+1}.</span>
        <div class="info">
          <span class="name">${t.spot.name}</span>
          <span class="reason">${t.reason}</span>
        </div>
        <span class="score">${t.score.toFixed(1)}<span class="score-out">/10</span></span>
      </div>
    `).join('');
  }

  // Map — rebuild on each open
  if (bestNowMap) {
    bestNowMap.remove();
    bestNowMap = null;
    bestNowMarkers = [];
  }

  if (top.length === 0) return;

  setTimeout(() => {
    bestNowMap = L.map('bestNowMap', {
      zoomControl: true, attributionControl: true, scrollWheelZoom: true,
    });
    L.tileLayer(
      `https://api.thunderforest.com/transport/{z}/{x}/{y}{r}.png?apikey=${TF_API_KEY}`,
      {
        attribution: '&copy; <a href="http://www.thunderforest.com/">Thunderforest</a>, &copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
        maxZoom: 22,
      }
    ).addTo(bestNowMap);

    bestNowMarkers = top.map((t, i) => {
      const icon = L.divIcon({
        className: '',
        html: `<div class="map-marker">
                 <div class="pin-dot"></div>
                 <span class="pin-lbl">${t.spot.name} · ${t.score.toFixed(1)}</span>
               </div>`,
        iconSize: null,
        iconAnchor: [0, 0],
      });
      const m = L.marker([t.spot.lat, t.spot.lng], { icon }).addTo(bestNowMap);
      m.on('click', () => flyToBestNow(i, top));
      return m;
    });

    const bounds = L.latLngBounds(top.map(t => [t.spot.lat, t.spot.lng]));
    bestNowMap.fitBounds(bounds, { padding: [60, 60], maxZoom: 16 });
  }, 50);

  // List → map fly
  $('bestNowList').onclick = e => {
    const row = e.target.closest('.bestnow-row');
    if (!row) return;
    flyToBestNow(parseInt(row.dataset.idx, 10), top);
  };
}

function flyToBestNow(i, top) {
  if (!bestNowMap || !top[i]) return;
  const s = top[i].spot;
  bestNowMap.flyTo([s.lat, s.lng], 17, { duration: 0.8 });
}

$('bestNowBtn').addEventListener('click', showBestNow);
$('bestNowBack').addEventListener('click', () => {
  $('bestNowView').classList.remove('visible');
});

// Hide stash hint after first interaction
let firstTap = true;
stash.addEventListener('click', () => {
  if (firstTap) { firstTap = false; }
});
</script>
